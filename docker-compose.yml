services:
  tour-auto-layout-web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      STORAGE_ROOT: /data
      MAX_CONCURRENT_JOBS: 3
      MAX_UPLOAD_SIZE_MB: 80
      ACCESS_PASSWORD: ""
    volumes:
      - ./storage:/data
