<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅游行程自动排版</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <h1>旅游行程自动排版</h1>
      <p class="hero-copy">上传模板图与word文档，自动生成保留正文内容的word成品</p>
    </section>

    <section id="login-panel" class="panel hidden">
      <h2>访问验证</h2>
      <form id="login-form" class="stack">
        <label class="field">
          <span>访问密码</span>
          <input id="password-input" name="password" type="password" autocomplete="current-password" required>
        </label>
        <button type="submit" class="primary-button">进入工具</button>
      </form>
      <p id="login-error" class="message error hidden"></p>
    </section>

    <section id="composer-panel" class="panel hidden">
      <form id="job-form" class="stack">
        <div class="upload-block">
          <div class="block-head">
            <div>
              <h2>模板底图</h2>
              <p>仅支持选择 1 张模板图</p>
            </div>
          </div>
          <label class="picker" for="template-input">
            <span class="picker-button">选择模板图</span>
            <span id="template-name" class="picker-meta">未选择模板图</span>
          </label>
          <input id="template-input" name="templateImage" class="hidden-input" type="file" accept=".png,.jpg,.jpeg,.gif,.bmp,.tif,.tiff" required>
        </div>

        <div class="upload-block">
          <div class="block-head">
            <div>
              <h2>旅游文档</h2>
              <p>可一次选择多份 .doc / .docx</p>
            </div>
            <p id="documents-summary" class="summary-note">未选择文档</p>
          </div>
          <label class="picker" for="documents-input">
            <span class="picker-button">选择文档</span>
            <span class="picker-meta">支持批量选择，生成多个成品</span>
          </label>
          <input id="documents-input" name="documents[]" class="hidden-input" type="file" accept=".doc,.docx" multiple required>
          <ul id="documents-list" class="file-list"></ul>
        </div>

        <div class="form-foot">
          <p id="limits-text" class="inline-note">准备上传文件…</p>
          <button id="submit-button" type="submit" class="primary-button">开始生成</button>
        </div>
      </form>
      <p id="submit-error" class="message error hidden"></p>
    </section>

    <section id="job-panel" class="panel hidden">
      <div class="result-head">
        <div>
          <h2>当前任务</h2>
          <p id="job-meta" class="inline-note">尚未创建任务。</p>
        </div>
        <a id="batch-download" class="secondary-link hidden" href="#" target="_blank" rel="noreferrer">下载整批 ZIP</a>
      </div>

      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
      <p id="job-status-text" class="inline-note">等待任务开始。</p>

      <div id="results" class="results-list"></div>
    </section>
  </main>

  <script src="/app.js" defer></script>
</body>
</html>
