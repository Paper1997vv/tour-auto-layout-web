<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅游行程自动排版</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <p class="eyebrow">TourAutoLayout Web</p>
      <h1>旅游行程自动排版</h1>
      <p class="hero-copy">上传模板图和 Word 文档，服务器自动生成保留正文内容的 Word 成品。</p>
    </section>

    <section id="login-panel" class="panel hidden">
      <div class="panel-header">
        <h2>访问验证</h2>
        <p>当前站点已启用单密码保护。</p>
      </div>
      <form id="login-form" class="stack">
        <label class="field">
          <span>访问密码</span>
          <input id="password-input" name="password" type="password" autocomplete="current-password" required>
        </label>
        <button type="submit" class="primary-button">进入工具</button>
      </form>
      <p id="login-error" class="message error hidden"></p>
    </section>

    <section id="composer-panel" class="panel hidden">
      <div class="panel-header">
        <h2>新建任务</h2>
        <p id="limits-text">准备上传文件…</p>
      </div>

      <form id="job-form" class="stack">
        <label class="field">
          <span>模板底图</span>
          <input id="template-input" name="templateImage" type="file" accept=".png,.jpg,.jpeg,.gif,.bmp,.tif,.tiff" required>
        </label>

        <label class="field">
          <span>旅游文档</span>
          <input id="documents-input" name="documents" type="file" accept=".doc,.docx" multiple required>
        </label>

        <div class="selected-files">
          <div>
            <strong>当前模板</strong>
            <p id="template-name" class="inline-note">未选择</p>
          </div>
          <div>
            <strong>文档列表</strong>
            <ul id="documents-list" class="file-list"></ul>
          </div>
        </div>

        <button id="submit-button" type="submit" class="primary-button">开始生成</button>
      </form>
      <p id="submit-error" class="message error hidden"></p>
    </section>

    <section id="job-panel" class="panel hidden">
      <div class="panel-header">
        <div>
          <h2>任务结果</h2>
          <p id="job-meta">尚未创建任务。</p>
        </div>
        <a id="batch-download" class="secondary-link hidden" href="#" target="_blank" rel="noreferrer">下载整批 ZIP</a>
      </div>

      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
      <p id="job-status-text" class="inline-note">等待任务开始。</p>

      <div id="results" class="results-grid"></div>
    </section>
  </main>

  <script src="/app.js" defer></script>
</body>
</html>
